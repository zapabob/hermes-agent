# scripts/hypura/pyproject.toml
[project]
name = "hypura-harness"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110.0",
  "uvicorn>=0.29.0",
  "python-osc>=1.8.3",
  "sounddevice>=0.4.6",
  "soundfile>=0.12.1",
  "httpx>=0.27.0",
  "filelock>=3.13.0",
  "pydantic>=2.0.0",
  "openai",
  "instructor",
  "backoff",
  "python-dotenv",
  "google-genai",
  "anthropic",
  "numpy",
  "pandas",
  "matplotlib",
  "scipy",
  "sympy>=1.14.0",
  "beautifulsoup4>=4.14.3",
  "psutil>=7.2.2",
  "redis>=5.0.0",
]

[project.optional-dependencies]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]
lora = [
  "torch>=2.2.0",
  "transformers>=4.40.0",
  "peft>=0.11.0",
  "datasets>=2.18.0",
  "trl>=0.9.0",
  "accelerate>=0.30.0",
  "bitsandbytes>=0.43.0",
  "aioredis>=2.0.0",
  "docker>=7.0.0",
]
studio = ["gradio>=4.0.0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
